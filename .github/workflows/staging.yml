name: Deploy — Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "22.22.2"

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm run lint

      - run: npm run typecheck

      - run: npm test

      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.STAGING_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.STAGING_SUPABASE_ANON_KEY }}

  deploy:
    name: Deploy Staging
    needs: ci
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Package release
        run: |
          mkdir -p release-package
          # Exclude dev artifacts; include standalone build outputs, public, and static assets
          cp -r src package.json package-lock.json next.config.ts tsconfig.json vitest.config.ts public .next release-package/ 2>/dev/null || true
          # Remove .next cache to reduce artifact size
          rm -rf release-package/.next/cache
          tar -czf meccha-staging-${{ github.sha }}.tar.gz -C release-package .

      - name: Transfer to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: deploy
          key: ${{ secrets.STAGING_SSH_KEY }}
          source: meccha-staging-${{ github.sha }}.tar.gz
          target: /tmp/

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.STAGING_SSH_HOST }}
          username: deploy
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            export PATH="/home/deploy/.nvm/versions/node/v22.22.2/bin:$PATH"
            export NEXT_PUBLIC_SUPABASE_URL="${{ vars.STAGING_SUPABASE_URL }}"
            export NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ vars.STAGING_SUPABASE_ANON_KEY }}"
            RELEASE_SHA="${{ github.sha }}"
            RELEASE_DIR="/opt/meccha-chameleon/staging/releases/$RELEASE_SHA"
            mkdir -p "$RELEASE_DIR"
            tar -xzf /tmp/meccha-staging-$RELEASE_SHA.tar.gz -C "$RELEASE_DIR"
            cd "$RELEASE_DIR"
            # Write env file so next build has the vars (standalone output bundles them at build time)
            printf '%s\n%s\n%s\n' \
              "NEXT_PUBLIC_SUPABASE_URL=$NEXT_PUBLIC_SUPABASE_URL" \
              "NEXT_PUBLIC_SUPABASE_ANON_KEY=$NEXT_PUBLIC_SUPABASE_ANON_KEY" \
              "SITE_URL=https://staging.meccha.fun" \
              > .env.production
            /home/deploy/.nvm/versions/node/v22.22.2/bin/npm ci --silent
            # Build standalone output on VPS (CI build artifacts not in tarball — .next/ is gitignored)
            /home/deploy/.nvm/versions/node/v22.22.2/bin/node node_modules/.bin/next build
            # Fix Next.js standalone static path: server.js resolves .next/static relative to
            # .next/standalone/ but actual static files are at .next/static (project root).
            # Create symlink so .next/standalone/.next/static -> .next/static
            mkdir -p "$RELEASE_DIR/.next/standalone/.next"
            ln -sfn "$RELEASE_DIR/.next/static" "$RELEASE_DIR/.next/standalone/.next/static"
            # Ensure media directories exist
            mkdir -p /srv/meccha-chameleon-staging/media/public/clues
            mkdir -p /srv/meccha-chameleon-staging/media/private/proofs
            # Atomic symlink switch
            rm -f /opt/meccha-chameleon/staging/current
            ln -s "$RELEASE_DIR" /opt/meccha-chameleon/staging/current
            # Fix nginx proxy buffer size for large Set-Cookie headers from Supabase auth
            # (proxy_buffer_size default 4K is too small for auth responses with tokens)
            if ! grep -q "proxy_buffer_size 128k" /etc/nginx/sites-available/meccha-chameleon-staging; then
              sudo sed -i '/proxy_read_timeout 86400;/a\        proxy_buffer_size 128k;\n        proxy_buffers 8 256k;\n        proxy_busy_buffers_size 256k;' /etc/nginx/sites-available/meccha-chameleon-staging
              sudo nginx -t && sudo nginx -s reload
            fi
            # Restart systemd service
            sudo systemctl restart meccha-chameleon-staging
            # Health check (5 retries, 5s apart)
            for i in 1 2 3 4 5; do
              sleep 5
              if curl -sf http://127.0.0.1:4201/api/health 2>&1 | grep -q '"status":"healthy"'; then
                echo "Health check passed (attempt $i)"
                exit 0
              fi
              echo "Health check attempt $i failed"
            done
            # Rollback on failure
            echo "Health check failed — rolling back"
            sudo systemctl stop meccha-chameleon-staging
            rm -f /opt/meccha-chameleon/staging/current
            PREV=$(ls -1t /opt/meccha-chameleon/staging/releases/ | grep -v "^$RELEASE_SHA$" | head -1)
            if [ -n "$PREV" ]; then
              ln -s "/opt/meccha-chameleon/staging/releases/$PREV" /opt/meccha-chameleon/staging/current
              sudo systemctl restart meccha-chameleon-staging
              echo "Rolled back to: $PREV"
            fi
            exit 1
